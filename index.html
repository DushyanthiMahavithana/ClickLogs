<html>

<head>
    <meta charset="utf8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔥 Firebase Config
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "cwadvanceddb.firebaseapp.com",
            projectId: "cwadvanceddb"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();

        var tapLogsArray = [];
        var tapCounter = 0;
        var startTap = 0, endTap = 0;

        var uniqueIdentifier = new Date().getTime();
        var dependentVariable = "";

        var interfaceSequence = 1;
        var tapLimit = 50;
        var dataSaved = false;

        function onLoad() {
            var el = document.getElementById('tapHere');

            ["mousedown", "mouseup", "touchstart", "touchend"].forEach(function (e) {
                el.addEventListener(e, tapityTap);
            });
        }

        function saveDependentVariable(d) {
            dependentVariable = d;
            document.getElementById("buttoncontainer").style.display = "none";
            document.getElementById("container").style.display = "block";
        }

        function tapityTap(e) {

            var now = new Date().getTime();

            if (e.type === "mousedown" || e.type === "touchstart") {
                startTap = now;
            }

            if (e.type === "mouseup" || e.type === "touchend") {

                endTap = now;

                if (startTap && endTap && startTap < endTap) {

                    tapCounter++;

                    var tap = {
                        tapSequenceNumber: tapCounter,
                        startTimestamp: startTap,
                        endTimestamp: endTap,
                        interfaceSequence: interfaceSequence,
                        interface: (interfaceSequence === 1) ? "nofeedback" : "feedbackshown"
                    };

                    tapLogsArray.push(tap);

                    if (tapCounter >= tapLimit) {

                        if (interfaceSequence === 1) {

                            saveToFirebase(); // save first batch

                            // reset for next round
                            tapLogsArray = [];
                            tapCounter = 0;
                            interfaceSequence = 2;

                            document.getElementById("continue").style.display = "block";
                            document.getElementById("tapHere").style.display = "none";

                        } else {

                            saveToFirebase(); // final save
                            document.getElementById("tapHere").style.display = "none";
                        }
                    }
                }

                startTap = 0;
                endTap = 0;
            }
        }

        function saveToFirebase() {

            if (dataSaved) return;
            dataSaved = true;

            for (let tap of tapLogsArray) {

                let duration = tap.endTimestamp - tap.startTimestamp;

                db.collection("tap_logs").add({
                    session_id: String(uniqueIdentifier),
                    platform: dependentVariable,
                    sequence: tap.tapSequenceNumber,
                    start_time: tap.startTimestamp,
                    end_time: tap.endTimestamp,
                    duration: duration,
                    interface_type: tap.interface,
                    interface_sequence: tap.interfaceSequence,
                    timestamp: new Date().toISOString()
                })
                .then(() => console.log("Saved"))
                .catch(err => console.error(err));
            }

            document.getElementById("container").innerHTML =
                "<h3>✅ Data Saved Successfully!</h3>";
        }

        function startNext() {
            dataSaved = false;
            tapLogsArray = [];

            document.getElementById("tapHere").style.display = "block";
            document.getElementById("continue").style.display = "none";
        }

        // Save if user leaves early
        window.addEventListener("beforeunload", function () {
            if (tapLogsArray.length > 0) {
                saveToFirebase();
            }
        });

    </script>
</head>

<body onload="onLoad()">

    <div id="buttoncontainer">
        <button onclick="saveDependentVariable('android')">Android</button>
        <button onclick="saveDependentVariable('pc')">PC</button>
    </div>

    <div id="container" style="display:none;">
        <button id="tapHere">Tap</button>
        <button id="continue" style="display:none;" onclick="startNext()">Continue</button>
    </div>

</body>

</html>
